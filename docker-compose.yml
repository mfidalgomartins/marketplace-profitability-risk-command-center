services:
  pipeline:
    build: .
    image: marketplace-command-center:latest
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      python src/pipeline/run_full_pipeline.py
      --raw-dir data/raw
      --processed-dir data/processed
      --charts-dir outputs/charts
      --dashboard-file outputs/dashboard/marketplace_command_center_dashboard.html
      --dashboard-demo-file outputs/dashboard/marketplace_command_center_dashboard_demo.html
      --dashboard-demo-max-orders 25000
      --monte-carlo-iterations 2000
      --schema-file schemas/v1/schema_contracts.json
      --reports-dir reports

  test:
    build: .
    image: marketplace-command-center:latest
    working_dir: /app
    volumes:
      - ./:/app
    command: pytest -q
